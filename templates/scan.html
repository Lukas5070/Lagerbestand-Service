{% extends "base.html" %}

{% block title %}Scannen | {{ app_title }}{% endblock %}

{% block content %}
  <section class="page-header">
    <h1 class="page-title">Barcode scannen</h1>
  </section>

  <section class="panel stack-md">
    <div class="scanner-reader">
      <div id="reader"></div>
    </div>
    <div id="scanResult" class="scan-result">Kamera wird vorbereitet…</div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const resultNode = document.getElementById("scanResult");

    function showScanMessage(message) {
      resultNode.textContent = message;
    }

    function onScanSuccess(decodedText) {
      showScanMessage(`Gefunden: ${decodedText}`);
      window.location.href = `/adjust_barcode/${decodedText}`;
    }

    if (window.Html5Qrcode) {
      const html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: (width, height) => {
            const minEdge = Math.min(width, height);
            return { width: minEdge * 0.78, height: minEdge * 0.78 };
          }
        },
        onScanSuccess
      ).then(() => {
        showScanMessage("Kamera aktiv – QR-Code scannen");
      }).catch((error) => {
        showScanMessage(`Fehler: ${error}`);
      });
    } else {
      showScanMessage("Scanner-Skript konnte nicht geladen werden.");
    }
  </script>
{% endblock %}
